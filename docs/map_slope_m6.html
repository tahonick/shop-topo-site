      function llToFt(lat, lon, refLat, refLon) {

      function distPointToSegmentFt(px, py, ax, ay, bx, by) {
        const dx = bx - ax, dy = by - ay;
        const L2 = dx*dx + dy*dy;
        let t = L2 > 0 ? ((px - ax)*dx + (py - ay)*dy) / L2 : 0;
        t = Math.max(0, Math.min(1, t));
        const cx = ax + t*dx, cy = ay + t*dy;
        return Math.hypot(px - cx, py - cy);

      function distPointToPolylineFt(latlon, polyll, refLat, refLon) {
        const [px, py] = llToFt(latlon[0], latlon[1], refLat, refLon);

        ll.forEach((p, i) => cornersTxt += cnames[i] + ': ' + p[0].toFixed(6) + ', ' + p[1].toFixed(6) + '\n');
        document.getElementById('trial-info').innerHTML =
          rows +
          '<div style="margin-top:4px"><button onclick="navigator.clipboard.writeText(`' + cornersTxt.replace(/`/g,'') + '`);this.innerText=\'Copied corners\'">📋 Copy corners</button>' +
          ' <small>(All 4 corners with labels.)</small></div>';
      };
      window.clearTrialShops = function() {
        if (trialLayer) trialLayer.clearLayers();
        document.getElementById('trial-info').innerHTML = '<small>Cleared. Click map or paste lat/lon to try again.</small>';
      };
      window.pasteToInput = async function() {
        try {
          const text = await navigator.clipboard.readText();
          const m = text.match(/(-?\d+\.\d+)\s*[,;\s]\s*(-?\d+\.\d+)/);
          if (m) {
            document.getElementById('trial-lat').value = m[1];
            document.getElementById('trial-lon').value = m[2];
            document.getElementById('trial-info').innerHTML = '<small>Pasted: ' + m[1] + ', ' + m[2] + '. Click "Draw shop".</small>';
          } else {
            alert('Could not parse lat/lon from clipboard:\n' + text);
          }
        } catch (err) {
          alert('Clipboard read blocked. Paste manually into the Lat/Lon boxes (Ctrl+V).');
        }
      };
      window.copyCenter = function() {
        const lat = document.getElementById('trial-lat').value;
        const lon = document.getElementById('trial-lon').value;
        navigator.clipboard.writeText(lat + ', ' + lon).then(() => {
          document.getElementById('trial-info').innerHTML = '<small>Copied: ' + lat + ', ' + lon + '</small>';
        });
      };
      function _setPreset(lat, lon, w, h, rot, label) {
        document.getElementById('trial-lat').value = lat.toFixed(6);
        document.getElementById('trial-lon').value = lon.toFixed(6);
        document.getElementById('trial-w').value   = w;
        document.getElementById('trial-h').value   = h;
        document.getElementById('trial-rot').value = rot;
        document.getElementById('trial-info').innerHTML =
          '<small>Loaded preset: <b>' + label + '</b> (' + w + '×' + h + '). Click "Draw shop".</small>';
        if (ensureMap()) {
          mapInstance.flyTo([lat, lon], Math.max(mapInstance.getZoom(), 19), {duration: 0.6});
        }
      }
      window.loadShopSite = function() {
        _setPreset(45.468071, -93.548858, 32, 40, 0, "Option F \u2014 final pad (shop_spec.json)");
      };
      window.loadNorthDropN = function() {
        _setPreset(45.468263, -93.548957, 40, 32, 0,
          '⚠ Old scan: N oak removed but pad still overlapped wet DEM — superseded by bowl-only logic.');
      };
      window.loadNorthDry = function() {
        _setPreset(45.468304, -93.549016, 40, 32, 0,
          '✅ Northmost bowl-safe 40×32 — all oaks kept; pad avoids NW runoff pocket (not the oak gap).');
      };
      window.loadBetweenNoN = function() {
        _setPreset(45.468071, -93.548858, 40, 32, 0.0,
          '🪓 Preferred north: SE oak removed in model; southerly scan + L-path driveway score; bowl pocket only (not orange DEM). Check east setback variance on plat.');
      };
      for (const id of ['trial-lat','trial-lon','trial-w','trial-h','trial-rot']) {
        const el = document.getElementById(id);
        if (el) el.addEventListener('keydown', e => { if (e.key === 'Enter') window.dropTrialShop(); });
      }
      window.addEventListener('load', () => setTimeout(ensureMap, 400));
      setTimeout(ensureMap, 1500);
    })();
    </script>
